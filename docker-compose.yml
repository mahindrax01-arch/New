version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cipherchat
      POSTGRES_USER: cipherchat
      POSTGRES_PASSWORD: cipherchat
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: development
      APP_SECRET_KEY: super-secret-change-me
      DATABASE_URL: postgresql+psycopg://cipherchat:cipherchat@postgres:5432/cipherchat
      CORS_ORIGINS: http://localhost:3000
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_MINUTES: 10080
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
    ports:
      - '8000:8000'
    command: sh -c "uv sync && uv run alembic upgrade head && uv run python -m app.seed && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: super-secret-change-me
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
    depends_on:
      - api
    ports:
      - '3000:3000'
    command: sh -c "pnpm install --frozen-lockfile=false && pnpm --dir apps/web dev --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
